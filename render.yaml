services:
  - type: web
    name: bodysense-api
    env: python
    repo: https://github.com/amanpati2007/BodySense.git
    branch: main
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r Backend/requirements.txt
    startCommand: uvicorn Backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
